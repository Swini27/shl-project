services:
  - type: web
    name: shl-assessment-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API
        sync: false              # You'll paste your key in the Render dashboard
      - key: CHROMA_DB_DIR
        value: /data/chroma_db  # Points to the persistent disk below
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
